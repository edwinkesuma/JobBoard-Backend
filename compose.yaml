services:
  mysql:
    image: 'mysql:latest'
    container_name: 'JobBoard'
    environment:
      - 'MYSQL_DATABASE=jobboarddb'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: